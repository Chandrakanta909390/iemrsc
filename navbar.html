<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(15,23,42,0.85);
    backdrop-filter:blur(12px);
    z-index:1000;
    border-bottom:1px solid rgba(0,247,255,0.2);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
    height:50px;
    object-fit:contain;
}

.logo span{
    color:#00f7ff;
    font-size:22px;
    font-family:'Orbitron', sans-serif;
    text-shadow:0 0 8px #00f7ff;
}

.nav-links{
    display:flex;
    gap:30px;
    list-style:none;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
}

.hamburger{
    display:none;
    font-size:32px;
    color:#00f7ff;
    cursor:pointer;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

    .navbar{
        padding:15px 20px;
    }

    .hamburger{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:80px;
        left:0;
        width:100%;
        background:rgba(15,23,42,0.95);
        backdrop-filter:blur(15px);

        flex-direction:column;
        align-items:center;
        gap:25px;
        padding:25px 0;

        display:none;
    }

    .nav-links.active{
        display:flex;
        animation:slideDown 0.4s ease;
    }
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

<script>
const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("navLinks");

hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});
</script>
